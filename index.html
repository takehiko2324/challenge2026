<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ジュニアチャレンジ教室 抽選結果確認</title>

<style>
body {
  font-family: sans-serif;
  padding: 24px;
  max-width: 560px;
  margin: auto;
  line-height: 1.7;
}

input,
button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  font-size: 18px;
  box-sizing: border-box;
}

button {
  background: #0b65c2;
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
}

button:disabled {
  background: #999;
  cursor: not-allowed;
}

.box {
  margin-top: 20px;
  padding: 16px;
  border-radius: 8px;
  background: #f3f3f3;
}
</style>
</head>

<body>

<h1>ジュニアチャレンジ教室</h1>
<h2>抽選結果確認</h2>

<p>
参加者フリガナと電話番号下4桁を入力してください。
</p>

<input
  id="kana"
  type="text"
  placeholder="例：グンマチャン"
  autocomplete="off"
>

<input
  id="tel4"
  type="text"
  placeholder="例：5678"
  maxlength="4"
  inputmode="numeric"
  autocomplete="off"
>

<button id="checkButton" onclick="checkResult()">
結果を確認する
</button>

<div id="message" class="box">
入力後、結果が表示されます。
</div>

<script>

/* 全角数字を半角数字に変換 */
function normalizeNumber(value) {
  return value
    .replace(/[０-９]/g, function(character) {
      return String.fromCharCode(character.charCodeAt(0) - 0xFEE0);
    })
    .replace(/\D/g, "");
}

/* フリガナの空白を除去 */
function normalizeKana(value) {
  return value
    .replace(/[\s　]/g, "")
    .trim();
}

async function checkResult() {

  const kanaInput = document.getElementById("kana").value;
  const tel4Input = document.getElementById("tel4").value;
  const message = document.getElementById("message");
  const checkButton = document.getElementById("checkButton");

  const kana = normalizeKana(kanaInput);
  const tel4 = normalizeNumber(tel4Input);

  if (!kana || !tel4) {
    message.innerHTML =
      "フリガナと電話番号下4桁を入力してください。";
    return;
  }

  if (tel4.length !== 4) {
    message.innerHTML =
      "電話番号の下4桁を、数字4桁で入力してください。";
    return;
  }

  checkButton.disabled = true;
  checkButton.textContent = "確認中です…";
  message.innerHTML = "抽選結果を確認しています。";

  try {

    const res = await fetch("results.json", {
      cache: "no-store"
    });

    if (!res.ok) {
      throw new Error(
        "results.jsonを読み込めませんでした。"
      );
    }

    const data = await res.json();

    const hit = data.find(function(item) {

      const itemKana = normalizeKana(
        String(item.kana || "")
      );

      const itemTel4 = normalizeNumber(
        String(item.tel4 || "")
      );

      return itemKana === kana &&
             itemTel4 === tel4;
    });

    if (!hit) {
      message.innerHTML =
        "該当する申込が見つかりません。<br>" +
        "フリガナと電話番号下4桁をご確認ください。";
      return;
    }

    if (hit.result === "win") {

      message.innerHTML = `
        <h2>おめでとうございます。当選です</h2>

        <p>
        本申込ページへお進みください。
        </p>

        <button
          onclick="location.href='${hit.targetUrl}'"
        >
        本申込へ進む
        </button>
      `;

    } else if (hit.result === "lose") {

      location.href = "lose.html";

    } else {

      message.innerHTML =
        "抽選結果を確認できませんでした。<br>" +
        "主催者へお問い合わせください。";
    }

  } catch (error) {

    console.error(error);

    message.innerHTML =
      "現在、抽選結果を読み込めません。<br>" +
      "時間をおいて、もう一度お試しください。";

  } finally {

    checkButton.disabled = false;
    checkButton.textContent = "結果を確認する";
  }
}

/* Enterキーでも確認できるようにする */
document.getElementById("kana").addEventListener(
  "keydown",
  function(event) {
    if (event.key === "Enter") {
      checkResult();
    }
  }
);

document.getElementById("tel4").addEventListener(
  "keydown",
  function(event) {
    if (event.key === "Enter") {
      checkResult();
    }
  }
);

</script>

</body>
</html>
