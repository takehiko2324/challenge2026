<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ジュニアチャレンジ教室 抽選結果確認</title>
<style>
body { font-family: sans-serif; padding: 24px; max-width: 560px; margin: auto; line-height: 1.7; }
input, button { width: 100%; padding: 14px; margin: 8px 0; font-size: 18px; box-sizing: border-box; }
button { background: #0b65c2; color: white; border: none; border-radius: 8px; font-weight: bold; }
.box { margin-top: 20px; padding: 16px; border-radius: 8px; background: #f3f3f3; }
</style>
</head>
<body>

<h1>ジュニアチャレンジ教室</h1>
<h2>抽選結果確認</h2>

<p>参加者フリガナと電話番号下4桁を入力してください。</p>

<input id="kana" placeholder="例：グンマチャン">
<input id="tel4" placeholder="例：5678" maxlength="4">

<button onclick="checkResult()">結果を確認する</button>

<div id="message" class="box">入力後、結果が表示されます。</div>

<script>
async function checkResult() {
  const kana = document.getElementById("kana").value.replace(/\s/g, "").trim();
  const tel4 = document.getElementById("tel4").value.trim();
  const message = document.getElementById("message");

  if (!kana || !tel4) {
    message.innerHTML = "フリガナと電話番号下4桁を入力してください。";
    return;
  }

  const res = await fetch("results.json");
  const data = await res.json();

  const hit = data.find(item =>
    item.kana.replace(/\s/g, "") === kana && item.tel4 === tel4
  );

  if (!hit) {
    message.innerHTML = "該当する申込が見つかりません。入力内容をご確認ください。";
    return;
  }

  if (hit.result === "win") {
    message.innerHTML = `
      <h2>おめでとうございます。当選です</h2>
      <p>本申込ページへお進みください。</p>
      <button onclick="location.href='${hit.targetUrl}'">本申込へ進む</button>
    `;
  } else {
    message.innerHTML = `
      <h2>今回は非当選となりました</h2>
      <p>代替イベントのご案内ページへお進みください。</p>
      <button onclick="location.href='${hit.targetUrl}'">代替イベントを見る</button>
    `;
  }
}
</script>

</body>
</html>
